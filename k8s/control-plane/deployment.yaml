apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: default
  labels:
    app: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      # Inject host.minikube.internal into the pod's /etc/hosts so DNS resolves
      # to the Docker host machine (where Cassandra, Redis run via docker-compose).
      # CoreDNS does NOT resolve this hostname — only the minikube node's /etc/hosts does.
      hostAliases:
        - ip: "192.168.65.254"
          hostnames:
            - "host.minikube.internal"
      containers:
        - name: control-plane
          image: control-plane-image
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          env:
            - name: REDIS_HOST
              value: "host.minikube.internal"
            - name: REDIS_PORT
              value: "6379"
            - name: SCYLLA_DB_CONTACT_POINTS
              value: "host.minikube.internal"
            - name: SCYLLA_DB_PORT
              value: "9042"
            - name: GRPC_PORT
              value: "9090"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 4
